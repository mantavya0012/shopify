<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Cart | VELVORA</title><script src="https://cdn.tailwindcss.com"></script><script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script><link rel="stylesheet" href="../assets/css/styles.css" /></head>
<body data-page="cart">
<div id="preloader" class="preloader"><div class="pulse"></div></div><div id="site-header"></div>
<main class="max-w-4xl mx-auto px-4 py-10">

  <h1 class="text-4xl font-black" data-animate>Your Cart</h1>
  <div id="cart-items" class="space-y-3 mt-6" data-animate></div>
  <div class="glass rounded-2xl p-5 mt-6 flex justify-between items-center" data-animate><span class="font-semibold">Total</span><span id="cart-total" class="text-2xl font-black">$0.00</span></div>
  <a class="btn-primary inline-block mt-6 px-6 py-3 rounded-xl" href="checkout.html">Proceed to Checkout</a>
</main>
<div id="site-footer"></div>
<script src="../assets/js/data.js"></script><script src="../assets/js/app.js"></script><script src="../assets/js/pages.js"></script>
</body></html>
